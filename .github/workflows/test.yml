name: API Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Start API
      run: |
        uvicorn app.main:app &
        sleep 5

    - name: Run tests
      run: pytest tests/test_api.py -v --html=test-report.html --self-contained-html

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-report
        path: test-report.html

    - name: Check error rate
      run: |
        ERROR_RATE=$(curl -s http://localhost:8000/metrics/summary | python -c "import sys, json; print(json.load(sys.stdin).get('error_rate', 0))")
        echo "Error rate: $ERROR_RATE%"
        if (( $(echo "$ERROR_RATE > 2" | bc -l) )); then
          echo "❌ Error rate exceeds 2%"
          exit 1
        fi
        echo "✅ Error rate within acceptable limits"
