version: '3.8'

services:
  api:
    build: .
    container_name: network-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./test_metrics.db
    volumes:
      - ./app:/app/app
      - ./test_metrics.db:/app/test_metrics.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  
  locust:
    image: locustio/locust:latest
    container_name: load-tester
    ports:
      - "8089:8089"
    volumes:
      - ./load_tests:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host=http://api:8000
    depends_on:
      - api